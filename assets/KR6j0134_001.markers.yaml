  - {type: variant, offset: 5505, length: 23, content: '長寬三秊【CB】，季【大】秊季五月十三日

      　　於勸修寺西明院書了　　範乘

      　　　　　　　　一交了', 甲: 寬治七年二月七日未剋書了，長承四季卯正月二十七日於持明院奉傳授御房了金剛佛子證印又一校了，（朱書）一挍了求法僧兼範本, 乙: 寶曆九年五月念五加修復了僧正承照}
